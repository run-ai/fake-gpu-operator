{{- if .Values.computeDomainController.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: computedomain-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: computedomain-controller
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: computedomain-controller
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: computedomain-controller
    spec:
      serviceAccountName: compute-domain-controller
      imagePullSecrets:
        - name: gcr-secret
      containers:
      - name: controller
        image: {{ include "fake-gpu-operator.fullImageName" ( dict "component" .Values.computeDomainController.image "global" .Values.global "chart" .Chart ) }}
        imagePullPolicy: {{ include "fake-gpu-operator.imagePullPolicy" (dict "component" .Values.computeDomainController "global" .Values.global) }}
        resources:
          {{- toYaml .Values.computeDomainController.resources | nindent 10 }}
{{- end }}

