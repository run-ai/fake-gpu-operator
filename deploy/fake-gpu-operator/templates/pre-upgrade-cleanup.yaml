{{- /*
Pre-upgrade cleanup for polyfill resources that hit Kubernetes' immutable
field constraints across chart-version upgrades or `gpuOperator.enabled`
flips.

Helm matches resources by Kind+Namespace+Name and patches in place — but:

  1) The polyfill `Deployment/gpu-operator` (rendered when
     `gpuOperator.enabled: false`) has `spec.selector` as an immutable
     field. Any change in selector labels — whether across chart versions
     (older charts used `{app, component}`, this chart uses
     `{app, app.kubernetes.io/component}` to match the upstream subchart),
     or when flipping to the upstream subchart's Deployment — fails the
     patch with `field is immutable`.

  2) The polyfill `RuntimeClass/nvidia` (handler=runc) collides with the
     upstream gpu-operator subchart's RuntimeClass (handler=nvidia). The
     `.handler` field is immutable, so the patch fails.

This Job runs ALWAYS on pre-upgrade and deletes only resources matching
the polyfill fingerprint (Deployment with `replicas: 0` and image starting
with `ubuntu:`; RuntimeClass with `handler: runc`). Real upstream-shaped
resources are left alone. It is a no-op when those fingerprints don't
match — first-time installs (resources don't exist) or already-migrated
clusters (resources are upstream-shaped).

Runs unconditionally because the Deployment selector can shift across
chart versions even when `gpuOperator.enabled` stays `false`.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fake-gpu-operator-pre-upgrade-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    app.kubernetes.io/managed-by: fake-gpu-operator
    fake-gpu-operator/component: pre-upgrade-cleanup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fake-gpu-operator-pre-upgrade-cleanup
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    app.kubernetes.io/managed-by: fake-gpu-operator
    fake-gpu-operator/component: pre-upgrade-cleanup
rules:
  - apiGroups: ["node.k8s.io"]
    resources: ["runtimeclasses"]
    verbs: ["get", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fake-gpu-operator-pre-upgrade-cleanup
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    app.kubernetes.io/managed-by: fake-gpu-operator
    fake-gpu-operator/component: pre-upgrade-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fake-gpu-operator-pre-upgrade-cleanup
subjects:
  - kind: ServiceAccount
    name: fake-gpu-operator-pre-upgrade-cleanup
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: fake-gpu-operator-pre-upgrade-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    app.kubernetes.io/managed-by: fake-gpu-operator
    fake-gpu-operator/component: pre-upgrade-cleanup
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: fake-gpu-operator
        fake-gpu-operator/component: pre-upgrade-cleanup
    spec:
      serviceAccountName: fake-gpu-operator-pre-upgrade-cleanup
      restartPolicy: Never
      containers:
        - name: cleanup
          image: {{ .Values.preUpgradeCleanup.image.repository }}:{{ .Values.preUpgradeCleanup.image.tag }}
          imagePullPolicy: {{ .Values.preUpgradeCleanup.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              ns={{ .Release.Namespace | quote }}

              # 1) Stale `nvidia` RuntimeClass polyfill (handler=runc).
              handler=$(kubectl get runtimeclass nvidia -o jsonpath='{.handler}' 2>/dev/null || true)
              if [ "$handler" = "runc" ]; then
                echo "Deleting stale RuntimeClass/nvidia (handler=runc polyfill)."
                kubectl delete runtimeclass nvidia
              elif [ -n "$handler" ]; then
                echo "RuntimeClass/nvidia has handler=$handler — leaving it alone."
              else
                echo "RuntimeClass/nvidia does not exist — nothing to clean up."
              fi

              # 2) Stale `gpu-operator` Deployment polyfill (replicas=0, ubuntu placeholder image).
              if kubectl get deployment gpu-operator -n "$ns" -o jsonpath='{.spec.replicas}' >/dev/null 2>&1; then
                replicas=$(kubectl get deployment gpu-operator -n "$ns" -o jsonpath='{.spec.replicas}')
                image=$(kubectl get deployment gpu-operator -n "$ns" -o jsonpath='{.spec.template.spec.containers[0].image}')
                case "$image" in
                  ubuntu:*)
                    echo "Deleting stale Deployment/gpu-operator polyfill (replicas=$replicas, image=$image)."
                    kubectl delete deployment gpu-operator -n "$ns"
                    ;;
                  *)
                    echo "Deployment/gpu-operator image=$image — not a polyfill, leaving it alone."
                    ;;
                esac
              else
                echo "Deployment/gpu-operator does not exist — nothing to clean up."
              fi
