{{- /* Polyfill — selector mirrors upstream subchart so gpuOperator.enabled flips are mutable patches (.spec.selector is immutable). */ -}}
{{- if not (.Values.gpuOperator).enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-operator
  labels:
    app: gpu-operator
    app.kubernetes.io/component: "gpu-operator"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: "gpu-operator"
      app: "gpu-operator"
  replicas: 0
  template:
    metadata:
      labels:
        app: "gpu-operator"
        app.kubernetes.io/component: "gpu-operator"
    spec:
      containers:
        - name: gpu-operator
          image: ubuntu:22.04
          args:
            - sleep
            - infinity
      restartPolicy: Always
      imagePullSecrets:
        - name: gcr-secret
{{- end -}}
