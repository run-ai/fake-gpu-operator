{{- /* Polyfill — must NOT render when gpuOperator.enabled (upstream owns RuntimeClass/nvidia with handler=nvidia; .handler is immutable). */ -}}
{{- if and .Values.runtimeClass.enabled (not (.Values.gpuOperator).enabled) -}}
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: nvidia
handler: runc
{{- end -}}
