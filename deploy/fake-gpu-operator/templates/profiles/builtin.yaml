      # ---------------------------------------------------------------------------
      gpu_operation_mode:
        current: "all_on"
        pending: "all_on"
    
      # ---------------------------------------------------------------------------
      # Driver model (Windows only)
      # ---------------------------------------------------------------------------
      driver_model:
        current: "N/A"
        pending: "N/A"
    
      # ---------------------------------------------------------------------------
      # Accounting mode
      # ---------------------------------------------------------------------------
      accounting:
