{{- if and .Values.statusUpdater.enabled .Values.statusUpdater.podPatchRbac.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fake-status-updater-pod-patch
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: fake-status-updater-pod-patch
subjects:
  - kind: ServiceAccount
    name: status-updater
    namespace: "{{ .Release.Namespace }}"
{{- end -}}
