environment:
  openshift: false
  fakeCSVVersion: 25.10.0
  resourceReservationNamespace: runai-reservation

prometheus:
  url: http://prometheus-operated.runai:9090

devicePlugin:
  enabled: true
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/device-plugin
    tag: ""
  resources: 
    requests:
      cpu: "100m"
      memory: "100Mi"
    limits:
      cpu: "200m"
      memory: "200Mi"

statusUpdater:
  enabled: true
  disableNodeLabeling: false
  podPatchRbac:
    enabled: true
  runaiIntegration:
    enabled: false
    pollingInterval: 2m
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/status-updater
    tag: ""
  resources: 
    requests:
      cpu: "200m"
      memory: "200Mi"
    limits:
      cpu: "400m"
      memory: "400Mi"

topologyServer:
  enabled: true
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/topology-server
    tag: ""
  resources: 
    requests:
      cpu: "100m"
      memory: "100Mi"
    limits:
      cpu: "200m"
      memory: "200Mi"

statusExporter:
  enabled: true
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/status-exporter
    tag: ""
  resources: 
    requests:
      cpu: "100m"
      memory: "100Mi"
    limits:
      cpu: "200m"
      memory: "200Mi"
  topologyMaxExportInterval: 10s
  # If using many KWOK nodes, you may need to increase the resources for the KWOK status-exporter
  kwok:
    prometheusRule:
      enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "100Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

kwokGpuDevicePlugin:
  enabled: true
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/kwok-gpu-device-plugin
    tag: ""
  resources: 
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "200m"
      memory: "400Mi"

kwokDraPlugin:
  enabled: false
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/kwok-dra-plugin
    tag: ""
  resources: 
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "200m"
      memory: "400Mi"

migFaker:
  enabled: true
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/mig-faker
    tag: ""

# Image config for the per-pool nvml-mock DaemonSet built by the mock controller.
# Only consumed when gpuOperator.enabled or nvidiaDraDriver.enabled is true.
nvmlMock:
  image:
    repository: ghcr.io/nvidia/nvml-mock
    tag: "v0.1.0"
    pullPolicy: IfNotPresent

gpuOperator:
  # When true, installs the upstream NVIDIA GPU Operator chart as a subchart.
  # When false (default), renders the placeholder Deployment + ClusterPolicy CRD
  # polyfill so upstream consumers (RunAI control plane, etc.) still detect
  # GPU Operator's presence on fake-only deployments.
  enabled: false
  # Informational — the actual subchart pin lives in Chart.yaml.
  chartVersion: "26.3.1"

# When true, installs nvidia-dra-driver-gpu as a subchart for DRA-based GPU
# allocation on mock-pool nodes. Independent of gpuOperator.enabled.
nvidiaDraDriver:
  enabled: false
  # Informational — actual pin lives in Chart.yaml.
  chartVersion: "25.12.0"

runtimeClass:
  enabled: true

topologyConfigMap:
  enabled: true

draPlugin:
  enabled: false
  image:
    repository: ghcr.io/run-ai/fake-gpu-operator/dra-plugin-gpu
    pullPolicy: Always
    tag: ""
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  kubeletPlugin:
    priorityClassName: "system-node-critical"
    updateStrategy:
      type: RollingUpdate
    podAnnotations: {}
    podSecurityContext: {}
    nodeSelector: 
      nvidia.com/gpu.deploy.dra-plugin-gpu: "true"
    tolerations: []
    affinity: {}
    kubeletRegistrarDirectoryPath: /var/lib/kubelet/plugins_registry
    kubeletPluginsDirectoryPath: /var/lib/kubelet/plugins
    containers:
      plugin:
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: "100m"
            memory: "100Mi"
          limits:
            cpu: "200m"
            memory: "200Mi"
        healthcheckPort: 51515
        livenessProbe:
          service: liveness
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
  imagePullSecrets: []

ubuntu:
  image:
    repository: "ubuntu"
    tag: "24.04"

topology:
  # nodePools is a map of node pool name to node pool configuration.
  # Nodes are assigned to node pools based on the node pool label's value (key is configurable via nodePoolLabelKey).
  # 
  # For example, nodes that have the label "run.ai/simulated-gpu-node-pool: default"
  # will be assigned to the "default" node pool.
  nodePools:
    default:
      gpuProduct: Tesla-K80
      gpuCount: 2
      gpuMemory: 11441
  nodePoolLabelKey: run.ai/simulated-gpu-node-pool
  migStrategy: mixed

builtinProfiles:
  enabled: true

customProfiles: {}

computeDomainController:
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/compute-domain-controller
    tag: ""
  resources:
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "200m"
      memory: "400Mi"

computeDomainDraPlugin:
  enabled: false
  healthcheckPort: 8082
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/compute-domain-dra-plugin
    tag: ""
  resources:
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "200m"
      memory: "400Mi"

kwokComputeDomainDraPlugin:
  enabled: false
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/kwok-compute-domain-dra-plugin
    tag: ""
  resources:
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "200m"
      memory: "400Mi"

# Subchart values block for upstream gpu-operator chart.
# Adopts NVIDIA's canonical nvml-mock + GPU Operator integration recipe verbatim:
#   https://github.com/NVIDIA/k8s-test-infra/blob/bab29f5f6f1e27f8ebf81d2c53523e7a7a2070f2/tests/e2e/gpu-operator-values.yaml
# When bumping nvml-mock or this recipe, replace the block below with the new
# upstream content and update the SHA above.
gpu-operator:
  # Driver is replaced by nvml-mock chart — no real kernel module needed.
  driver:
    enabled: false

  # Container toolkit is not needed — the mock libs are placed on the host
  # by the nvml-mock DaemonSet, not injected by the toolkit.
  toolkit:
    enabled: false

  # DCGM is not supported by the mock NVML (requires full driver stack).
  dcgm:
    enabled: false

  dcgmExporter:
    enabled: false

  # MIG is not supported by the mock NVML — disable manager and set strategy to none.
  # Without this, the device-plugin enumerates MIG devices and the CDI spec generator
  # treats any non-NOT_FOUND return as fatal (the mock now returns NOT_FOUND).
  mig:
    strategy: none
  migManager:
    enabled: false

  # Node status exporter depends on DCGM — disable.
  nodeStatusExporter:
    enabled: false

  # CDI mode — the toolkit reads /var/run/cdi/nvidia.yaml generated by nvml-mock.
  cdi:
    enabled: true
    default: true

  # Device plugin discovers GPUs via mock NVML.
  devicePlugin:
    enabled: true
    config:
      name: ""
    env:
      - name: NVIDIA_DRIVER_ROOT
        value: "/var/lib/nvml-mock/driver"

  # GFD reads GPU attributes via mock NVML and labels the node.
  gfd:
    enabled: true
    env:
      - name: NVIDIA_DRIVER_ROOT
        value: "/var/lib/nvml-mock/driver"

  # Validator checks that the GPU stack is functional.
  # driver-validation: mounts hostPath /run/nvidia/driver → our mock (via symlink).
  # toolkit-validation: CDI injection makes nvidia-smi available inside containers.
  # cuda-validation: WITH_WORKLOAD=false skips vectorAdd (kernel launch is a no-op).
  # plugin-validation: checks nvidia.com/gpu in node allocatable.
  validator:
    driver:
      env:
        - name: DRIVER_INSTALL_DIR
          value: "/run/nvidia/driver"
        - name: LD_LIBRARY_PATH
          value: "/run/nvidia/driver/usr/lib64"
        - name: DISABLE_DEV_CHAR_SYMLINK_CREATION
          value: "true"
    toolkit:
      env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
    cuda:
      env:
        - name: WITH_WORKLOAD
          value: "false"
    plugin:
      env:
        - name: LD_LIBRARY_PATH
          value: "/run/nvidia/driver/usr/lib64"

# Subchart values block for nvidia-dra-driver-gpu.
# Defaults follow the nvml-mock README's DRA recipe.
nvidia-dra-driver-gpu:
  nvidiaDriverRoot: /var/lib/nvml-mock/driver
  gpuResourcesEnabledOverride: true
  resources:
    computeDomains:
      enabled: false
