environment:
  openshift: false
  fakeCSVVersion: 25.10.0
  resourceReservationNamespace: runai-reservation

prometheus:
  url: http://prometheus-operated.runai:9090

devicePlugin:
  enabled: true
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/device-plugin
    tag: ""
  resources: 
    requests:
      cpu: "100m"
      memory: "100Mi"
    limits:
      cpu: "200m"
      memory: "200Mi"

statusUpdater:
  enabled: true
  disableNodeLabeling: false
  podPatchRbac:
    enabled: true
  runaiIntegration:
    enabled: false
    pollingInterval: 2m
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/status-updater
    tag: ""
  resources: 
    requests:
      cpu: "200m"
      memory: "200Mi"
    limits:
      cpu: "400m"
      memory: "400Mi"

topologyServer:
  enabled: true
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/topology-server
    tag: ""
  resources: 
    requests:
      cpu: "100m"
      memory: "100Mi"
    limits:
      cpu: "200m"
      memory: "200Mi"

statusExporter:
  enabled: true
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/status-exporter
    tag: ""
  resources: 
    requests:
      cpu: "100m"
      memory: "100Mi"
    limits:
      cpu: "200m"
      memory: "200Mi"
  topologyMaxExportInterval: 10s
  # If using many KWOK nodes, you may need to increase the resources for the KWOK status-exporter
  kwok:
    prometheusRule:
      enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "100Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

kwokGpuDevicePlugin:
  enabled: true
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/kwok-gpu-device-plugin
    tag: ""
  resources: 
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "200m"
      memory: "400Mi"

kwokDraPlugin:
  enabled: false
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/kwok-dra-plugin
    tag: ""
  resources: 
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "200m"
      memory: "400Mi"

migFaker:
  enabled: true
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/mig-faker
    tag: ""

# Per-pool nvml-mock DaemonSet image (consumed by mock controller).
nvmlMock:
  image:
    repository: ghcr.io/nvidia/nvml-mock
    # Upstream publishes :latest only.
    tag: latest
    pullPolicy: IfNotPresent

# When true, installs upstream gpu-operator subchart. When false, renders a
# placeholder Deployment polyfill (the ClusterPolicy CRD ships via crds/).
gpuOperator:
  enabled: false

# When true, installs nvidia-dra-driver-gpu subchart for DRA-based GPU allocation.
nvidiaDraDriver:
  enabled: false

runtimeClass:
  enabled: true

topologyConfigMap:
  enabled: true

draPlugin:
  enabled: false
  image:
    repository: ghcr.io/run-ai/fake-gpu-operator/dra-plugin-gpu
    pullPolicy: Always
    tag: ""
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  kubeletPlugin:
    priorityClassName: "system-node-critical"
    updateStrategy:
      type: RollingUpdate
    podAnnotations: {}
    podSecurityContext: {}
    nodeSelector: 
      nvidia.com/gpu.deploy.dra-plugin-gpu: "true"
    tolerations: []
    affinity: {}
    kubeletRegistrarDirectoryPath: /var/lib/kubelet/plugins_registry
    kubeletPluginsDirectoryPath: /var/lib/kubelet/plugins
    containers:
      plugin:
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: "100m"
            memory: "100Mi"
          limits:
            cpu: "200m"
            memory: "200Mi"
        healthcheckPort: 51515
        livenessProbe:
          service: liveness
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
  imagePullSecrets: []

ubuntu:
  image:
    repository: "ubuntu"
    tag: "24.04"

topology:
  # nodePools is a map of node pool name to node pool configuration.
  # Nodes are assigned to node pools based on the node pool label's value (key is configurable via nodePoolLabelKey).
  # 
  # For example, nodes that have the label "run.ai/simulated-gpu-node-pool: default"
  # will be assigned to the "default" node pool.
  nodePools:
    default:
      gpuProduct: Tesla-K80
      gpuCount: 2
      gpuMemory: 11441
  nodePoolLabelKey: run.ai/simulated-gpu-node-pool
  migStrategy: mixed

builtinProfiles:
  enabled: true

customProfiles: {}

computeDomainController:
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/compute-domain-controller
    tag: ""
  resources:
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "200m"
      memory: "400Mi"

computeDomainDraPlugin:
  enabled: false
  healthcheckPort: 8082
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/compute-domain-dra-plugin
    tag: ""
  resources:
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "200m"
      memory: "400Mi"

kwokComputeDomainDraPlugin:
  enabled: false
  image:
    pullPolicy: Always
    repository: ghcr.io/run-ai/fake-gpu-operator/kwok-compute-domain-dra-plugin
    tag: ""
  resources:
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "200m"
      memory: "400Mi"

# Mirrors NVIDIA/k8s-test-infra's canonical nvml-mock + GPU Operator integration:
# https://github.com/NVIDIA/k8s-test-infra/blob/main/tests/e2e/gpu-operator-values.yaml
gpu-operator:
  driver:
    enabled: false
  toolkit:
    enabled: false
    # When toolkit.enabled is flipped to true, the installer's device-node
    # enumeration step queries real NVML and fails on mock-NVML nodes with
    # "no NVIDIA devices found". Skip it — nvml-mock already creates the
    # /dev/nvidia* nodes under its driver root.
    env:
      - name: CREATE_DEVICE_NODES
        value: "none"
  dcgm:
    enabled: false
  dcgmExporter:
    enabled: false
  # MIG isn't supported by mock NVML — strategy=none avoids the device-plugin
  # treating MIG enumeration as fatal.
  mig:
    strategy: none
  migManager:
    enabled: false
  nodeStatusExporter:
    enabled: false
  cdi:
    enabled: true
    default: true
  devicePlugin:
    enabled: true
    config:
      name: ""
    env:
      - name: NVIDIA_DRIVER_ROOT
        value: "/var/lib/nvml-mock/driver"
  # GFD's job (write nvidia.com/gpu.product/count/memory node labels) is
  # already covered by FGO's status-exporter, which reads from the topology
  # CM. GFD's own NVML lookup fails on mock-NVML containers because its
  # pod template doesn't mount /var/lib/nvml-mock. Disabled to avoid a
  # cosmetic CrashLoopBackOff that doesn't add functionality.
  gfd:
    enabled: false
    env:
      - name: NVIDIA_DRIVER_ROOT
        value: "/var/lib/nvml-mock/driver"
  validator:
    driver:
      env:
        - name: DRIVER_INSTALL_DIR
          value: "/run/nvidia/driver"
        - name: LD_LIBRARY_PATH
          value: "/run/nvidia/driver/usr/lib64"
        - name: DISABLE_DEV_CHAR_SYMLINK_CREATION
          value: "true"
    toolkit:
      env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
    cuda:
      env:
        - name: WITH_WORKLOAD
          value: "false"
    plugin:
      env:
        - name: LD_LIBRARY_PATH
          value: "/run/nvidia/driver/usr/lib64"

# Mirrors nvml-mock README's DRA recipe.
nvidia-dra-driver-gpu:
  nvidiaDriverRoot: /var/lib/nvml-mock/driver
  gpuResourcesEnabledOverride: true
  resources:
    computeDomains:
      enabled: false
