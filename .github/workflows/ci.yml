name: CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Image/Helm tag to build and push (e.g. 0.0.0-rc1)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_REGISTRY: "ghcr.io/run-ai/fake-gpu-operator"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Cache linter
        uses: actions/cache@v4
        with:
          path: ~/.cache
          key: ${{ runner.os }}-lint-${{ hashFiles('**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-lint-
      - name: Run lint
        run: make lint

  chart-render-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Render chart under adversarial null values
        run: make chart-render-guard

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Run tests
        run: make test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install kind
        uses: helm/kind-action@v1.13.0
      - name: Run e2e tests (old format)
        run: make e2e
        env:
          DOCKER_TAG: 0.0.0-dev
          DOCKER_REPO_BASE: ghcr.io/run-ai/fake-gpu-operator
          DOCKER_BUILDX_PLATFORMS: linux/amd64

  e2e-profiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install kind
        uses: helm/kind-action@v1.13.0
      - name: Run e2e tests (profile format)
        run: make e2e-profiles
        env:
          DOCKER_TAG: 0.0.0-dev
          DOCKER_REPO_BASE: ghcr.io/run-ai/fake-gpu-operator
          DOCKER_BUILDX_PLATFORMS: linux/amd64

  e2e-mock:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install kind
        uses: helm/kind-action@v1.13.0
        with:
          install_only: true
      - name: Run mock e2e tests
        run: make e2e-mock
        env:
          DOCKER_TAG: 0.0.0-dev
          DOCKER_REPO_BASE: ghcr.io/run-ai/fake-gpu-operator
          DOCKER_BUILDX_PLATFORMS: linux/amd64

  e2e-upgrade:
    name: e2e-upgrade (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pinned baseline — catches regressions vs. a known-good release that
          # external users have been running for weeks.
          - name: pinned-0.0.80
            baseline: "0.0.80"
          # Tip of main — catches regressions vs. the very latest released
          # commit, closing the gap between "shipped to users" and "about to
          # ship to users."
          - name: latest-main
            baseline: resolve-main
    steps:
      - uses: actions/checkout@v4
        with:
          # Need recent origin/main history for the latest-main lane (it walks
          # first-parent commits to find a published chart). Tags are fetched
          # by the resolve step's own `git fetch origin --tags`, NOT here:
          # fetch-tags:true breaks on tag-push runs (the release trigger) because
          # checkout then fetches both the commit and refs/tags/<tag> into the
          # same ref -> "fatal: Cannot fetch both <sha> and refs/tags/<tag>".
          fetch-depth: 40
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install kind
        uses: helm/kind-action@v1.13.0
        with:
          install_only: true
      - name: Resolve baseline chart version
        id: resolve
        run: |
          set -eo pipefail
          if [[ "${{ matrix.baseline }}" != "resolve-main" ]]; then
            echo "version=${{ matrix.baseline }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # release-helm publishes 0.0.0-<7-char-sha> only for first-parent
          # commits (merge commits / direct pushes to main). Walking every
          # commit would waste the window on feature-branch commits that a
          # merge drags into history but that were never published — a single
          # PR with >=4 commits could fill the whole window with dead SHAs.
          # So walk --first-parent, and keep the window wide enough to ride out
          # a streak of in-flight/unpublished commits.
          git fetch origin main --depth=40
          CHART=oci://ghcr.io/run-ai/fake-gpu-operator/fake-gpu-operator
          for SHA in $(git log origin/main --first-parent --format='%h' --max-count=15); do
            VERSION="0.0.0-${SHA}"
            if helm pull "$CHART" --version "$VERSION" --destination /tmp >/dev/null 2>&1; then
              echo "Resolved latest-main chart: ${VERSION}"
              echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "  not pullable: ${VERSION}"
          done
          # No recent main chart published yet — fall back to the latest release
          # tag instead of failing. This keeps the lane (and the release gate it
          # blocks via `needs`) from deadlocking when main charts are missing or
          # in-flight: a hard failure here skips release-helm, which then never
          # publishes the chart the next run would need.
          git fetch origin --tags --depth=1 >/dev/null 2>&1 || true
          LATEST="$(git tag -l 'v*' --sort=-v:refname | sed -n '1s/^v//p')"
          if [[ -z "$LATEST" ]]; then
            echo "ERROR: no recent main chart and no release tag to fall back to."
            exit 1
          fi
          echo "No recent main chart published; falling back to latest release: ${LATEST}"
          echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
      - name: Run helm-upgrade e2e tests
        # Installs the resolved baseline chart, then upgrades to the chart on
        # this branch. Catches the RUN-39195 regression class — templates
        # that reference top-level values the baseline's stored values lack.
        run: make e2e-upgrade
        env:
          BASELINE_CHART_VERSION: ${{ steps.resolve.outputs.version }}
          DOCKER_TAG: 0.0.0-dev
          DOCKER_REPO_BASE: ghcr.io/run-ai/fake-gpu-operator
          DOCKER_BUILDX_PLATFORMS: linux/amd64

  set-release-vars:
    if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.release_tag != '' }}
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.vars.outputs.release_version }}
    steps:
      - name: Set release variables
        id: vars
        run: |
          if [[ -n "${{ inputs.release_tag }}" ]]; then
            # Manual dispatch
            echo "release_version=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          elif [[ ${{ github.ref }} =~ ^refs/tags/ ]]; then
            # Version tag
            echo "release_version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          elif [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
            # Push to main
            echo "release_version=0.0.0-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

  release-docker:
    runs-on: ubuntu-latest
    needs: [set-release-vars, lint, chart-render-guard, test, e2e, e2e-profiles, e2e-mock, e2e-upgrade]
    if: ${{ needs.set-release-vars.outputs.release_version != '' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [device-plugin, dra-plugin-gpu, status-updater, kwok-gpu-device-plugin, kwok-dra-plugin, status-exporter, topology-server, mig-faker, jupyter-notebook, compute-domain-controller, compute-domain-dra-plugin]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ matrix.component }}:${{ needs.set-release-vars.outputs.release_version }}
          target: ${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,name=${{ matrix.component }}-cache

  release-helm:
    runs-on: ubuntu-latest
    needs: [release-docker, set-release-vars]
    # Skip helm push on manual workflow_dispatch — those are image-only builds from feature branches
    if: ${{ needs.set-release-vars.outputs.release_version != '' && inputs.release_tag == '' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve subchart dependencies
        # The chart pulls gpu-operator + nvidia-dra-driver-gpu as conditional
        # subcharts. helm package requires charts/ populated even when the
        # conditions render false at install time.
        run: helm dependency update deploy/fake-gpu-operator
      - name: Build
        run: |
          helm package deploy/fake-gpu-operator -d ./charts --version ${{ needs.set-release-vars.outputs.release_version }} --app-version ${{ needs.set-release-vars.outputs.release_version }}
      - name: Push
        run: |
          helm push ./charts/fake-gpu-operator-${{ needs.set-release-vars.outputs.release_version }}.tgz oci://${{ env.DOCKER_REGISTRY }}
