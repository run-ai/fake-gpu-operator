# Integration test values - PROFILE-BASED GPU config (cluster: key)
# Tests the profile resolution pipeline: ClusterConfig → Load → Merge → Extract → NodeTopology

environment:
  openshift: false
  resourceReservationNamespace: runai-reservation

# Enable DRA plugin for GPU allocation
draPlugin:
  enabled: true
  image:
    pullPolicy: Never

# Enable status-updater to manage node topology
statusUpdater:
  enabled: true
  runaiIntegration:
    enabled: true
    pollingInterval: 5s
  image:
    pullPolicy: Never

# Enable topology server for nvidia-smi and DRA plugin to fetch topology
topologyServer:
  enabled: true
  image:
    pullPolicy: Never

# Enable topology ConfigMap for status-updater
topologyConfigMap:
  enabled: true

# Disable components not needed for integration tests
devicePlugin:
  enabled: false

statusExporter:
  enabled: true
  image:
    pullPolicy: Never

kwokGpuDevicePlugin:
  enabled: false

kwokDraPlugin:
  enabled: true
  image:
    pullPolicy: Never

migFaker:
  enabled: false

gpuOperator:
  enabled: false

runtimeClass:
  enabled: false

computeDomainController:
  image:
    pullPolicy: Never

computeDomainDraPlugin:
  enabled: true
  image:
    pullPolicy: Never

kwokComputeDomainDraPlugin:
  enabled: true
  image:
    pullPolicy: Never

builtinProfiles:
  enabled: true

# Profile-based GPU topology
# The T4 profile defaults to 1 device; we override to 2 so the multi-pod
# DRA tests (which need 2 distinct GPUs) pass with this values file.
# The H100 profile defaults to 8 devices; we override to 4 for the highend pool.
cluster:
  nodePoolLabelKey: run.ai/simulated-gpu-node-pool
  migStrategy: none
  nodePools:
    default:
      gpu:
        backend: nvml-mock
        profile: t4
        overrides:
          devices:
            - index: 0
              uuid: "GPU-T4-0000-0000-0000-000000000000"
            - index: 1
              uuid: "GPU-T4-0000-0000-0000-000000000001"
    highend:
      gpu:
        backend: nvml-mock
        profile: h100
        overrides:
          devices:
            - index: 0
              uuid: "GPU-H100-0000-0000-0000-000000000000"
            - index: 1
              uuid: "GPU-H100-0000-0000-0000-000000000001"
            - index: 2
              uuid: "GPU-H100-0000-0000-0000-000000000002"
            - index: 3
              uuid: "GPU-H100-0000-0000-0000-000000000003"
