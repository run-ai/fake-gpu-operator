# E2E test values - PROFILE-BASED GPU config (cluster: key)
# Tests the profile resolution pipeline: ClusterConfig → Load → Merge → Extract → NodeTopology

environment:
  openshift: false
  resourceReservationNamespace: runai-reservation

# Enable DRA plugin for GPU allocation
draPlugin:
  enabled: true
  image:
    pullPolicy: Never

# Enable status-updater to manage node topology
statusUpdater:
  enabled: true
  runaiIntegration:
    enabled: true
    pollingInterval: 5s
  image:
    pullPolicy: Never

# Enable topology server for nvidia-smi and DRA plugin to fetch topology
topologyServer:
  enabled: true
  image:
    pullPolicy: Never

# Enable topology ConfigMap for status-updater
topologyConfigMap:
  enabled: true

# Disable components not needed for e2e tests
devicePlugin:
  enabled: false

statusExporter:
  enabled: true
  image:
    pullPolicy: Never

kwokGpuDevicePlugin:
  enabled: false

kwokDraPlugin:
  enabled: true
  image:
    pullPolicy: Never

migFaker:
  enabled: false

gpuOperator:
  enabled: false

runtimeClass:
  enabled: false

computeDomainController:
  image:
    pullPolicy: Never

computeDomainDraPlugin:
  enabled: true
  image:
    pullPolicy: Never

kwokComputeDomainDraPlugin:
  enabled: true
  image:
    pullPolicy: Never

builtinProfiles:
  enabled: true

# Profile-based GPU topology
# Both profiles default to more devices than we need, so we override the device
# list to match the old-format values (default: 2 GPUs, highend: 4 GPUs).
cluster:
  nodePoolLabelKey: run.ai/simulated-gpu-node-pool
  migStrategy: none
  nodePools:
    default:
      gpu:
        backend: nvml-mock
        profile: a100
        overrides:
          devices:
            - index: 0
            - index: 1
    highend:
      gpu:
        backend: nvml-mock
        profile: h100
        overrides:
          devices:
            - index: 0
            - index: 1
            - index: 2
            - index: 3
